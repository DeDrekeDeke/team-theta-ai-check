server:
  port: 8080

spring:
  application:
    name: cv-manager-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cvmanager}
    username: ${SPRING_DATASOURCE_USERNAME:cvmanager}
    password: ${SPRING_DATASOURCE_PASSWORD:cvmanager}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  auth:
    issuer: cv-manager
    secret: ${APP_AUTH_SECRET:change-this-development-secret-key-to-at-least-32-bytes}
    access-token-ttl-minutes: 15
  admin:
    email: admin@example.com
    password: admin123
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-5.5}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
